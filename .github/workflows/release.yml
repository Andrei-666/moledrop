name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o mole-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext || '' }} ./cmd/mole

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: mole-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext || '' }}
